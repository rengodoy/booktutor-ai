# glyph runs LOCALLY on the host as a thin orchestrator (no torch/docling here).
# These are the on-demand OCR engine services it spins up via `docker compose
# up -d <svc>`, calls over HTTP (published ports on 127.0.0.1), and stops at the
# end of a run. You can also start them yourself; glyph reuses a running service.
services:
  # ----------------------------------------------------------------------------
  # docling part. easyocr / tesseract OCR over HTTP (glyph-docling-server :8002),
  # with Tesseract lang packs (por/eng) baked into the image. CPU by default —
  # it's the cheap early tier and Tesseract is CPU anyway. The orchestrator POSTs
  # a rasterized page PNG to /ocr; no PDFs are mounted.
  #   docker compose up -d docling
  # ----------------------------------------------------------------------------
  docling:
    build:
      context: .
      dockerfile: Dockerfile
    image: rengodoy/glyph-ai:latest
    container_name: glyph-docling
    env_file:
      - .env
    environment:
      - HF_HOME=/hf-cache
    ports:
      - "8002:8002"   # OCR HTTP server (DOCLING_SERVER_PORT)
    volumes:
      - ./src:/app/src          # editable install -> live code, no rebuild
      - hf-cache:/hf-cache      # model cache (docling / easyocr) — persists
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,os; urllib.request.urlopen(f'http://127.0.0.1:{os.environ.get(\\\"DOCLING_SERVER_PORT\\\",\\\"8002\\\")}/health')\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    # CPU by default. To put docling on GPU0 (if there's headroom), uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           device_ids: ['0']
    #           capabilities: [gpu]

  # ----------------------------------------------------------------------------
  # deepseek2 part. DeepSeek-OCR-2 over HTTP (glyph-deepseek2-server :8001) in its
  # own image (transformers <4.48 conflicts with docling). Pinned to GPU1. The
  # strongest tier of the ladder; the model loads once (minutes-long cold start).
  #   docker compose up -d deepseek2
  # ----------------------------------------------------------------------------
  deepseek2:
    build:
      context: .
      dockerfile: Dockerfile.deepseek2
    image: rengodoy/glyph-deepseek2:latest
    container_name: glyph-deepseek2
    env_file:
      - .env
    environment:
      - HF_HOME=/hf-cache
    ports:
      - "8001:8001"   # OCR HTTP server (DS2_SERVER_PORT)
    volumes:
      - ./src:/app/src          # editable install -> live code, no rebuild
      - hf-cache:/hf-cache      # model cache (DeepSeek-OCR-2) — persists
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']   # pin to GPU1 (Vision-LLM reconciler holds GPU0)
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,os; urllib.request.urlopen(f'http://127.0.0.1:{os.environ.get(\\\"DS2_SERVER_PORT\\\",\\\"8001\\\")}/health')\""]
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 300s

volumes:
  hf-cache:
