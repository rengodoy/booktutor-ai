services:
  booktutor:
    build:
      context: .
      dockerfile: Dockerfile
    image: rengodoy/booktutor-ai:latest
    container_name: booktutor
    env_file:
      - .env
    volumes:
      - ./books:/app/books      # drop your PDFs here
      - ./indexes:/app/indexes  # persisted FAISS collections
    stdin_open: true            # keep STDIN open for the interactive chat loop
    tty: true
    # Override at run time, e.g.:
    #   docker compose run --rm booktutor ingest books/mybook.pdf -c mybook
    #   docker compose run --rm booktutor chat -c mybook
    command: ["list"]
