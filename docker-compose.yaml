services:
  # ----------------------------------------------------------------------------
  # App container. Runs the booktutor CLI with tesseract OCR baked into the image
  # (lang packs por/eng). Use it for OCR_ENGINE=tesseract, or OCR_ENGINE=vlm
  # (then it calls the deepseek-ocr service below).
  #   docker compose run --rm booktutor ingest books/livro.pdf -c livro
  #   docker compose run --rm booktutor chat -c livro
  # ----------------------------------------------------------------------------
  booktutor:
    build:
      context: .
      dockerfile: Dockerfile
    image: rengodoy/booktutor-ai:latest
    container_name: booktutor
    env_file:
      - .env
    volumes:
      - ./books:/app/books      # drop your PDFs here
      - ./pdf:/app/pdf          # (also) source PDFs / extracted markdown
      - ./indexes:/app/indexes  # persisted FAISS collections
      - hf-cache:/home/ubuntu/.cache/huggingface  # model cache (embeddings/docling)
    stdin_open: true
    tty: true
    # GPU (comment out if running CPU-only):
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["list"]

  # ----------------------------------------------------------------------------
  # DeepSeek-OCR served by vLLM (OpenAI-compatible vision endpoint), used when
  # OCR_ENGINE=vlm. Started only with the "vlm" profile:
  #   docker compose --profile vlm up -d deepseek-ocr
  #   docker compose run --rm booktutor ingest books/livro.pdf -c livro
  # In .env set: OCR_ENGINE=vlm and VLM_OCR_API_BASE=http://deepseek-ocr:8000/v1
  # NOTE: DeepSeek-OCR needs a recent/nightly vLLM; adjust the image/flags if the
  # model fails to load (see README).
  # ----------------------------------------------------------------------------
  deepseek-ocr:
    image: vllm/vllm-openai:nightly
    container_name: deepseek-ocr
    profiles: ["vlm"]
    command:
      - "--model=unsloth/DeepSeek-OCR"
      - "--served-model-name=unsloth/DeepSeek-OCR"
      - "--trust-remote-code"
      - "--max-model-len=8192"
      - "--gpu-memory-utilization=0.85"
    environment:
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    ports:
      - "8000:8000"
    volumes:
      - hf-cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # Pin to one idle GPU (avoids contention with the app / desktop).
              # Adjust the index to your free GPU (see `nvidia-smi -L`).
              device_ids: ["1"]
              capabilities: [gpu]

volumes:
  hf-cache:
