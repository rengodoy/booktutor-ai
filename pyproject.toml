[project]
name = "booktutor-ai"
version = "0.3.0"
description = "OCR any PDF into high-quality Markdown (docling / DeepSeek-OCR)."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    # easyocr + tesserocr OCR backends are optional extras since docling 2.10x.
    "docling[easyocr,tesserocr]>=2.107.0",
    "huggingface-hub[hf-xet]>=0.32.3",
    "openai>=1.30.0",
    "pydantic-settings>=2.5.0",
    "torch>=2.7.1",
    # DeepSeek-OCR-2 in-process (OCR_ENGINE=deepseek2) remote-code deps.
    # flash-attn is optional (set DS2_ATTN_IMPL=flash_attention_2 if installed).
    "transformers>=4.46.3",
    "einops>=0.8.0",
    "addict>=2.4.0",
    "easydict>=1.13",
]

[project.scripts]
booktutor = "booktutor.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.2.0",
    "ruff>=0.6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/booktutor"]

[tool.uv]
# Hold only the GPU pair at a CUDA-consistent (cu128) version: a blind torch
# bump pulls a torchvision built against cu130 -> "compiled with different CUDA
# major versions" at import. docling/transformers are free to upgrade.
constraint-dependencies = [
    "torch==2.7.1",
    "torchvision==0.22.1",
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv.sources]
torch = [
  { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
torchvision = [
  { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[tool.pytest.ini_options]
testpaths = ["tests"]
