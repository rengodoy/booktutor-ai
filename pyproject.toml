[project]
name = "booktutor-ai"
version = "0.2.0"
description = "Turn any PDF book into a RAG-powered AI tutor over any OpenAI-compatible LLM."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "docling>=2.34.0",
    "faiss-cpu>=1.11.0",
    "huggingface-hub[hf-xet]>=0.32.3",
    "langchain>=0.3.25",
    "langchain-community>=0.3.21",
    "langchain-core>=0.3.63",
    "langchain-openai>=0.3.18",
    "langchain-text-splitters>=0.3.8",
    "pydantic-settings>=2.5.0",
    "tesserocr>=2.8.0",
    "torch>=2.7.1",
]

[project.scripts]
booktutor = "booktutor.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.2.0",
    "ruff>=0.6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/booktutor"]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv.sources]
torch = [
  { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
torchvision = [
  { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[tool.pytest.ini_options]
testpaths = ["tests"]
