[project]
name = "booktutor-ai"
version = "0.3.0"
description = "OCR any PDF into high-quality Markdown (docling / DeepSeek-OCR)."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "docling>=2.34.0",
    "huggingface-hub[hf-xet]>=0.32.3",
    "openai>=1.30.0",
    "pydantic-settings>=2.5.0",
    "tesserocr>=2.8.0",
    "torch>=2.7.1",
]

[project.scripts]
booktutor = "booktutor.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.2.0",
    "ruff>=0.6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/booktutor"]

[tool.uv]
# Conservative upgrades: hold the GPU/ML stack at the known-good versions.
# torch 2.11 / transformers 5 break docling 2.36 and cause a torch/torchvision
# CUDA wheel mismatch (cu128 vs cu130). Everything else is free to upgrade.
constraint-dependencies = [
    "torch==2.7.1",
    "torchvision==0.22.1",
    "transformers==4.52.4",
    "docling==2.36.1",
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv.sources]
torch = [
  { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
torchvision = [
  { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[tool.pytest.ini_options]
testpaths = ["tests"]
